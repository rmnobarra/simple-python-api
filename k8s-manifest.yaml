apiVersion: v1
kind: Namespace
metadata:
  name: simple-python-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-python-api
  namespace: simple-python-api
  labels:
    app: simple-python-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: simple-python-api
  template:
    metadata:
      labels:
        app: simple-python-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: simple-python-api
          image: rmnobarra/simple-python-api:latest
          ports:
            - containerPort: 5000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 110m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /users
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /users
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: simple-python-api
  namespace: simple-python-api
  labels:
    app: simple-python-api
spec:
  type: ClusterIP
  selector:
    app: simple-python-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
